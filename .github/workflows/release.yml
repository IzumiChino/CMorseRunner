name: Release

on:
  workflow_run:
    workflows: ['Version Bump']
    types: [completed]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-release:
    if: >-
      (github.event_name == 'workflow_run' &&
      github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.head_branch == 'main') ||
      github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-24.04

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true
          ref: refs/heads/main

      - name: Resolve release metadata
        id: meta
        run: |
          TAG="$(git tag --points-at HEAD | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+$' | sort -V | tail -n1 || true)"
          if [ -z "$TAG" ]; then
            echo "No semantic-version tag found on commit $(git rev-parse --short HEAD)." >&2
            exit 1
          fi
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"

      - name: Validate semantic version tag
        run: |
          if [[ ! "${{ steps.meta.outputs.tag }}" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Tag '${{ steps.meta.outputs.tag }}' is not in semantic-version format (vMAJOR.MINOR.PATCH)." >&2
            exit 1
          fi

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            cmake ninja-build \
            qt6-base-dev qt6-multimedia-dev \
            portaudio19-dev

      - name: Configure
        run: cmake -B build -G Ninja -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: cmake --build build -j$(nproc)

      - name: Package
        id: package
        run: |
          VERSION="${{ steps.meta.outputs.tag }}"
          PKGDIR="CMorseRunner-${VERSION}-linux-x86_64"
          mkdir -p "dist/${PKGDIR}"
          cp build/MorseRunner "dist/${PKGDIR}/"
          cp LICENSE README.md "dist/${PKGDIR}/"
          cp -r LICENSES "dist/${PKGDIR}/"
          cd dist
          tar czf "${PKGDIR}.tar.gz" "${PKGDIR}"
          echo "asset=${PKGDIR}.tar.gz" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.meta.outputs.tag }}
          target_commitish: ${{ steps.meta.outputs.sha }}
          name: CMorseRunner ${{ steps.meta.outputs.tag }}
          files: dist/${{ steps.package.outputs.asset }}
          generate_release_notes: true
          fail_on_unmatched_files: true
          body: |
            ## Dependencies

            The binary is dynamically linked. Install before running:

            **Debian/Ubuntu:**
            ```
            sudo apt install qt6-base-dev qt6-multimedia-dev portaudio19-dev
            ```
            **Arch:**
            ```
            sudo pacman -S qt6-base qt6-multimedia portaudio
            ```
