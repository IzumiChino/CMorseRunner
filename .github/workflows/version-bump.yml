name: Version Bump

on:
  push:
    branches: [main]

concurrency:
  group: version-bump-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  bump-version:
    if: >-
      github.actor != 'github-actions[bot]' &&
      !startsWith(github.event.head_commit.message, 'chore: bump version to ')
    runs-on: ubuntu-24.04

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.ref_name }}

      - name: Configure git user
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Check if current commit is already version-tagged
        id: tag_check
        run: |
          if git tag --points-at HEAD | grep -Eq '^v[0-9]+\.[0-9]+\.[0-9]+$'; then
            echo "should_bump=false" >> "$GITHUB_OUTPUT"
          else
            echo "should_bump=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Bump patch version and tag
        if: steps.tag_check.outputs.should_bump == 'true'
        run: |
          bash scripts/bump-version.sh patch
          git push origin HEAD:${{ github.ref_name }} --follow-tags
